name: Daily ADP Update

on:
  schedule:
    # Every day at 06:00 UTC (8:00 Schweizer Zeit)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-adp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest Sleeper ADP from BeatADP
        run: python update_adp.py

      - name: Commit updated ADP data
        run: |
          git config user.name "ADP Bot"
          git config user.email "adp-bot@users.noreply.github.com"
          git add fantasy-draft.html
          git diff --staged --quiet || git commit -m "🏈 Daily ADP update $(date +'%Y-%m-%d')"
          git push
